<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#E91E8C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="B&S DEPENDIENTES">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>B&S DEPENDIENTES</title>
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/app.css?v=5">
  <link rel="stylesheet" href="/css/components/navbar.css">
  <link rel="stylesheet" href="/css/components/cards.css">
</head>
<body>
  <!-- Top Bar -->
  <header class="topbar" id="topbar">
    <h1 id="topbar-title">B&S DEPENDIENTES</h1>
    <button class="topbar-action" onclick="router.navigate('config')" aria-label="Configuración">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- Main content -->
  <main id="app"></main>

  <!-- Bottom Navigation -->
  <nav class="navbar" id="navbar">
    <button class="nav-item" data-page="inicio" onclick="router.navigate('inicio')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Inicio</span>
    </button>
    <button class="nav-item" data-page="productos" onclick="router.navigate('productos')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
      <span>Modos de uso</span>
    </button>
    <button class="nav-fab" data-page="venta" onclick="router.navigate('venta')" aria-label="Escanear y registrar venta">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="7" y1="8" x2="17" y2="8"/><line x1="7" y1="16" x2="17" y2="16"/>
      </svg>
    </button>
    <button class="nav-item" data-page="puntos" onclick="router.navigate('puntos')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      <span>Puntos</span>
    </button>
    <button class="nav-item" data-page="config" onclick="router.navigate('config')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      <span>Perfil</span>
    </button>
  </nav>

  <!-- ==================== PAGE TEMPLATES ==================== -->

  <template id="page-login">
    <div class="page" style="padding-top:0;">
      <div class="login-header">
        <img src="/icons/icon-192.png" alt="Belleza & Salud" style="width:80px;height:80px;margin-bottom:12px;">
        <h1>B&S DEPENDIENTES</h1>
        <p>Registra tus ventas, acumula puntos</p>
      </div>
      <div id="login-section">
        <form id="login-form">
          <div id="login-error" class="alert alert-error" style="display:none;"></div>
          <div class="form-group">
            <label for="nit">NIT de la tienda</label>
            <input type="text" id="nit" name="nit" placeholder="Ej: 900123456" required inputmode="numeric">
          </div>
          <div class="form-group">
            <label for="codigo">Código de acceso</label>
            <input type="text" id="codigo" name="codigo" placeholder="Tu código de 6 dígitos" required inputmode="numeric" maxlength="6">
          </div>
          <div class="form-group">
            <label for="pin">PIN</label>
            <input type="password" id="pin" name="pin" placeholder="••••" required inputmode="numeric" maxlength="6">
          </div>
          <button type="submit" class="btn btn-primary">Iniciar sesión</button>
        </form>
        <div style="margin-top:12px;text-align:center;">
          <a href="#" id="show-recover" class="btn-link">Olvidé mi PIN</a>
        </div>
        <div class="login-divider">o</div>
        <button class="btn btn-outline" id="show-register">Soy nueva, registrarme</button>
      </div>
      <div id="register-section" style="display:none;">
        <h2 class="section-title" style="margin-bottom:16px;">Crear cuenta</h2>
        <form id="register-form">
          <div id="register-msg" class="alert" style="display:none;"></div>
          <div class="form-group">
            <label for="nombre">Tu nombre</label>
            <input type="text" id="nombre" name="nombre" placeholder="Nombre completo" required>
          </div>
          <div class="form-group">
            <label for="nitTienda">NIT de tu tienda</label>
            <input type="text" id="nitTienda" name="nitTienda" placeholder="Ej: 900123456" required inputmode="numeric">
          </div>
          <div class="form-group">
            <label for="regPin">Crea un PIN (mín. 4 dígitos)</label>
            <input type="password" id="regPin" name="regPin" placeholder="••••" required inputmode="numeric" minlength="4" maxlength="6">
          </div>
          <button type="submit" class="btn btn-primary">Registrarme</button>
        </form>
        <button class="btn btn-link" id="show-login" style="margin-top:12px;width:100%;text-align:center;">Ya tengo cuenta, iniciar sesión</button>
      </div>
      <div id="recover-section" style="display:none;">
        <h2 class="section-title" style="margin-bottom:16px;">Recuperar PIN</h2>
        <form id="recover-form">
          <div id="recover-msg" class="alert" style="display:none;"></div>
          <div class="form-group">
            <label for="recNit">NIT de tu tienda</label>
            <input type="text" id="recNit" name="recNit" placeholder="Ej: 900123456" required inputmode="numeric">
          </div>
          <div class="form-group">
            <label for="recCodigo">Tu código de acceso</label>
            <input type="text" id="recCodigo" name="recCodigo" placeholder="Tu código de 6 dígitos" required inputmode="numeric" maxlength="6">
          </div>
          <div class="form-group">
            <label for="recPin">Nuevo PIN (mín. 4 dígitos)</label>
            <input type="password" id="recPin" name="recPin" placeholder="••••" required inputmode="numeric" minlength="4" maxlength="6">
          </div>
          <button type="submit" class="btn btn-primary">Cambiar PIN</button>
        </form>
        <button class="btn btn-link" id="show-login-from-recover" style="margin-top:12px;width:100%;text-align:center;">Volver a iniciar sesión</button>
      </div>
    </div>
  </template>

  <template id="page-inicio">
    <div class="page">
      <h2 class="section-title">Marcas</h2>
      <div class="brand-scroll" id="brand-scroll">
        <p style="color:var(--color-muted);font-size:0.85rem;">Cargando...</p>
      </div>
      <h2 class="section-title" style="margin-top:24px;">Premios</h2>
      <div class="premio-hero">
        <div class="premio-hero-pct">2<span>%</span></div>
        <div class="premio-hero-info">
          <h3>De cada pote en puntos</h3>
          <p>El <strong>2%</strong> del valor de cada pote se convierte en puntos.</p>
        </div>
      </div>
      <div class="card premio-conversion">
        <div class="conv-row">
          <span class="conv-money">$100</span>
          <svg class="conv-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          <span class="conv-points">1 punto</span>
        </div>
        <p id="texto-premios" style="line-height:1.6;color:var(--color-text);margin-top:12px;">Cargando...</p>
      </div>
    </div>
  </template>

  <template id="page-productos">
    <div class="page">
      <h2 class="section-title">Modos de uso</h2>
      <div class="coming-soon">
        <div class="coming-soon-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
        </div>
        <h3>Muy pronto</h3>
        <p>Estamos preparando los modos de uso de todos los productos. Esta sección se habilitará pronto.</p>
        <span class="coming-soon-badge">En construcción</span>
      </div>
    </div>
  </template>

  <template id="page-venta">
    <div class="page">
      <h2 class="section-title">Registrar venta</h2>

      <!-- Scanner section -->
      <div id="scanner-section" style="margin-bottom:20px;">
        <button class="btn btn-primary" id="btn-scan" style="background:var(--color-accent);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/>
          </svg>
          Escanear código de barras
        </button>
        <div id="scanner-container" style="display:none;margin-top:12px;">
          <video id="scanner-video" style="width:100%;border-radius:var(--radius-md);background:#000;" playsinline></video>
          <div style="display:flex;gap:8px;margin-top:8px;">
            <input type="text" id="manual-barcode" placeholder="O escribe el código manualmente..." style="flex:1;padding:12px;border:1.5px solid var(--color-border);border-radius:var(--radius-sm);font-size:1rem;">
            <button class="btn btn-primary" id="btn-manual-search" style="width:auto;padding:12px 16px;">Buscar</button>
          </div>
          <button class="btn btn-link" id="btn-cancel-scan" style="margin-top:4px;width:100%;text-align:center;">Cancelar escáner</button>
        </div>
        <div id="scanner-result" style="display:none;margin-top:12px;"></div>
      </div>

      <div class="login-divider">o busca manualmente</div>

      <div class="search-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
        <input type="text" id="venta-search" placeholder="Buscar producto por nombre...">
      </div>
      <div id="venta-product-list"></div>
      <div id="venta-selected"></div>
      <div id="venta-form-section" style="display:none;">
        <div class="form-group">
          <label for="venta-cantidad">Cantidad vendida</label>
          <input type="number" id="venta-cantidad" value="1" min="1" inputmode="numeric">
        </div>
        <button class="btn btn-primary" id="venta-confirm">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          Confirmar venta
        </button>
      </div>
      <div id="venta-result" style="display:none;"></div>
    </div>
  </template>

  <template id="page-puntos">
    <div class="page">
      <div style="text-align:center;padding:16px 0 24px;">
        <p class="points-label">Tus puntos</p>
        <p class="points-big" id="total-puntos">0</p>
      </div>
      <h3 class="section-title" style="font-size:1.1rem;">Historial reciente</h3>
      <div class="card" id="historial-ventas">
        <p style="text-align:center;color:var(--color-muted);padding:16px 0;">Cargando...</p>
      </div>
    </div>
  </template>

  <template id="page-config">
    <div class="page">
      <h2 class="section-title">Mi cuenta</h2>
      <div class="card" style="margin-bottom:20px;">
        <p style="font-size:0.85rem;color:var(--color-muted);margin-bottom:4px;">Código de acceso</p>
        <p style="font-size:1.2rem;font-weight:600;letter-spacing:0.1em;" id="config-codigo">—</p>
      </div>
      <div class="card" style="margin-bottom:20px;">
        <p style="font-size:0.85rem;color:var(--color-muted);margin-bottom:4px;">Tienda</p>
        <p style="font-weight:500;" id="config-tienda">—</p>
      </div>
      <form id="config-form" style="margin-bottom:24px;">
        <div class="form-group">
          <label for="config-nombre">Nombre</label>
          <input type="text" id="config-nombre" required>
        </div>
        <button type="submit" class="btn btn-primary">Guardar cambios</button>
      </form>
      <button class="btn btn-outline" id="btn-logout" style="color:var(--color-error);border-color:var(--color-error);">Cerrar sesión</button>
    </div>
  </template>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
